name: Deploy to GitHub Pages

on:
  # Rebuild and publish whenever you push to main.
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the GitHub Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        # withastro/action installs deps, runs `astro build`, and uploads the
        # site artifact. It reads the Node version from .nvmrc automatically.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
